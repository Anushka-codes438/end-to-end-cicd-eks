version: '3.9'
services:
  mysql:
    image: mysql:8.0
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: cloud_inventory
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
  flask:
   build: .
   container_name: flask-container
   restart: always
   ports:
      - "5000:5000"
   environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: cloud_inventory
      DB_PORT: 3306
   depends_on:
     - mysql
volumes:
    mysql_data:



  